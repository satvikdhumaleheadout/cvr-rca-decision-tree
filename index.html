// CHANGELOG EXPLORER
// ══════════════════════════════════════════════════════════════════════════════

// ── CHANGELOG.md parser ───────────────────────────────────────────────────────
function parseChangelog(text) {
  const results = [];
  const lines   = text.split('\n');

  let v            = null;   // current version object
  let f            = null;   // current file section
  let summaryMode  = false;
  let summaryLines = [];

  // Flush helpers
  const flushFile = () => {
    // Only keep file sections that actually have bullet changes
    if (f && v && f.changes.length > 0) v.files.push(f);
    f = null;
  };
  const flushVersion = () => {
    if (!v) return;
    if (summaryMode) {
      v.summary = summaryLines.join(' ').replace(/\s+/g, ' ').trim();
      summaryMode = false; summaryLines = [];
    }
    flushFile();
    results.push(v);
    v = null;
  };

  for (const raw of lines) {
    const line = raw;

    // ── Version heading  ## [v1.3] — 2026-04-28 — Title
    const vm = line.match(/^## \[(v[\d.]+)\] — (\d{4}-\d{2}-\d{2}) — (.+)/);
    if (vm) { flushVersion(); v = { version: vm[1], date: vm[2], title: vm[3].trim(), summary: '', files: [] }; continue; }
    if (!v) continue;

    // ── Summary start
    if (line.match(/^\*\*Summary:\*\*/)) {
      summaryMode = true;
      summaryLines.push(line.replace(/^\*\*Summary:\*\*\s*/, '').trim());
      continue;
    }

    // ── Section heading (### ...) — stop summary collection
    if (line.startsWith('###')) {
      if (summaryMode) { v.summary = summaryLines.join(' ').replace(/\s+/g, ' ').trim(); summaryMode = false; summaryLines = []; }
      continue;
    }

    // ── Trailing footer / hr
    if (line.trim() === '---' || line.startsWith('*Each future')) {
      if (summaryMode) { v.summary = summaryLines.join(' ').replace(/\s+/g, ' ').trim(); summaryMode = false; summaryLines = []; }
      continue;
    }

    // ── Continue collecting summary (multi-paragraph)
    // Stop if we hit a clear file-heading pattern (line is just **bold**)
    if (summaryMode) {
      const isBoldHeading = line.match(/^\*\*[^*\n]+\*\*(?:\s*\([^)]+\))?$/);
      if (!isBoldHeading) { summaryLines.push(line.trim()); continue; }
      // Otherwise fall through to file heading handling
      v.summary = summaryLines.join(' ').replace(/\s+/g, ' ').trim();
      summaryMode = false; summaryLines = [];
    }

    // ── File heading — **`SKILL.md`** (c003 → c007)  or  **Category name**
    const fm = line.match(/^\*\*(.+?)\*\*(?:\s*\(([^)]+)\))?$/);
    if (fm) {
      flushFile();
      const rawName = fm[1].replace(/`/g, '').trim();
      f = { fileName: rawName, commitRange: fm[2] || null, changes: [] };
      continue;
    }

    // ── Bullet under a file section
    if (f && line.match(/^[-*] /)) {
      const bulletText = line.replace(/^[-*]\s*/, '').trim();
      // Try commit pattern:  **c012 — Name:** detail  or  **c012:** detail
      const cm = bulletText.match(/^\*\*(c\d+)(?:\s*[—–-]\s*([^:*\n]+))?\*\*:?\s*([\s\S]*)/);
      if (cm) {
        f.changes.push({
          commitId: cm[1],
          name:     (cm[2] || '').replace(/\*\*/g, '').trim(),
          detail:   cm[3].replace(/\*\*/g, '').replace(/`/g, '').trim(),
          subItems: [],
        });
      } else {
        f.changes.push({
          commitId: null, name: null,
          detail: bulletText.replace(/\*\*/g, '').replace(/`/g, '').trim(),
          subItems: [],
        });
      }
      continue;
    }

    // ── Indented sub-bullet — attach to last change
    if (f && f.changes.length > 0 && line.match(/^\s{2,}[-*] /)) {
      const sub = line.replace(/^\s+[-*]\s*/, '').replace(/\*\*/g, '').replace(/`/g, '').trim();
      f.changes[f.changes.length - 1].subItems.push(sub);
    }
  }

  flushVersion();
  return results.reverse(); // newest first
}

// ── File card colour by type ──────────────────────────────────────────────────
function fileCardStyle(fileName) {
  const n = fileName.toLowerCase();
  if (n === 'skill.md' || n === 'skill' || n.includes('core skill'))
    return { bg: '#eef2ff', fg: '#4338ca', border: '#c7d2fe', dot: '#6366f1' };
  if (n.startsWith('references/') || n.includes('context') || n.includes('hypothesis')
      || n.includes('worked') || n.includes('actions') || n.includes('report_struct')
      || n.includes('evaluator') || n.includes('reference file') || n.includes('sql pipeline'))
    return { bg: '#f0fdfa', fg: '#0f766e', border: '#99f6e4', dot: '#14b8a6' };
  if (n.startsWith('scripts/') || n.includes('.sh') || n.includes('.py')
      || n.includes('script') || n.includes('report template') || n.includes('evaluation rubric'))
    return { bg: '#faf5ff', fg: '#7e22ce', border: '#e9d5ff', dot: '#a855f7' };
  if (n === 'removed' || n.startsWith('removed'))
    return { bg: '#fef2f2', fg: '#b91c1c', border: '#fecaca', dot: '#ef4444' };
  return { bg: '#f8fafc', fg: '#475569', border: '#e2e8f0', dot: '#94a3b8' };
}

// ── App (Decision Tree view) ──────────────────────────────────────────────────
function DecisionTreeView() {
  // Compute initial zoom based on viewport — targets the ~1450px-wide main action column
  const INIT_ZOOM = Math.min(0.92, Math.max(0.70, (window.innerWidth - 60) / 1500));
  const INIT_PAN_X = Math.max(20, (window.innerWidth - 1450 * INIT_ZOOM) / 2);

  const [zoom, setZoom]             = useState(INIT_ZOOM);
  const [pan,  setPan]              = useState({ x: INIT_PAN_X, y: 10 });
  const [selectedNode, setSelected] = useState(null);
  const [dragging, setDragging]     = useState(false);

  const dragAnchor  = useRef(null);  // { clientX, clientY, panX, panY }
  const dragMoved   = useRef(false); // true once mouse moves >4px after mousedown
  const wrapRef     = useRef(null);

  // ── Derived ──────────────────────────────────────────────────────────────
  const nodeMap = useMemo(
    () => Object.fromEntries(NODES.map(n => [n.id, n])),
    []
  );

  // IDs that stay fully lit when something is selected (selected + its neighbours)
  const litIds = useMemo(() => {
    if (!selectedNode) return null;
    const s = new Set([selectedNode.id]);
    EDGES.forEach(e => {
      if (e.from === selectedNode.id) s.add(e.to);
      if (e.to   === selectedNode.id) s.add(e.from);
    });
    return s;
  }, [selectedNode]);

  const panelOpen = selectedNode !== null;

  // ── Zoom ─────────────────────────────────────────────────────────────────
  const applyZoom = useCallback(delta => {
    setZoom(z => Math.max(0.22, Math.min(2.0, z + delta)));
  }, []);

  const resetView = useCallback(() => {
    const z = Math.min(0.92, Math.max(0.70, (window.innerWidth - 60) / 1500));
    setZoom(z);
    setPan({ x: Math.max(20, (window.innerWidth - 1450 * z) / 2), y: 10 });
  }, []);

  // Non-passive wheel listener so we can preventDefault
  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const onWheel = e => {
      e.preventDefault();
      applyZoom(e.deltaY < 0 ? 0.07 : -0.07);
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [applyZoom]);

  // ── Pan (drag) ────────────────────────────────────────────────────────────
  const onMouseDown = useCallback(e => {
    if (e.button !== 0) return;
    setDragging(true);
    dragMoved.current = false;
    dragAnchor.current = {
      clientX: e.clientX,
      clientY: e.clientY,
      panX: pan.x,
      panY: pan.y,
    };
  }, [pan]);

  const onMouseMove = useCallback(e => {
    if (!dragging || !dragAnchor.current) return;
    const dx = e.clientX - dragAnchor.current.clientX;
    const dy = e.clientY - dragAnchor.current.clientY;
    if (!dragMoved.current && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
      dragMoved.current = true;
    }
    setPan({ x: dragAnchor.current.panX + dx, y: dragAnchor.current.panY + dy });
  }, [dragging]);

  const onMouseUp = useCallback(() => {
    setDragging(false);
    dragAnchor.current = null;
  }, []);

  // ── Selection ─────────────────────────────────────────────────────────────
  const handleNodeClick = useCallback(node => {
    setSelected(prev => prev?.id === node.id ? null : node);
  }, []);

  const handleClose = useCallback(() => setSelected(null), []);

  const onClickCapture = useCallback(e => {
    if (dragMoved.current) {
      e.stopPropagation();
      dragMoved.current = false;
    }
  }, []);

  const onCanvasClick = useCallback(e => {
    const t = e.target;
    if (
      t === wrapRef.current ||
      t.classList.contains('canvas-inner') ||
      t.tagName === 'svg' ||
      t.classList.contains('edges-svg')
    ) {
      setSelected(null);
    }
  }, []);

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <>
      {/* ── Canvas ── */}
      <div
        ref={wrapRef}
        className={[
          'canvas-wrap',
          dragging  ? 'dragging'   : '',
          panelOpen ? 'panel-open' : '',
        ].filter(Boolean).join(' ')}
        onMouseDown={onMouseDown}
        onMouseMove={onMouseMove}
        onMouseUp={onMouseUp}
        onMouseLeave={onMouseUp}
        onClickCapture={onClickCapture}
        onClick={onCanvasClick}
      >
        <div
          className="canvas-inner"
          style={{
            width:  CANVAS_W,
            height: CANVAS_H,
            transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
          }}
        >
          <SvgEdges edges={EDGES} nodeMap={nodeMap} selectedId={selectedNode?.id || null} />

          {SECTION_LABELS.slice(1).map(sec => (
            <div key={`sep-${sec.text}`} className="phase-line" style={{ top: sec.y - 20 }} />
          ))}
          {SECTION_LABELS.map(sec => (
            <div key={sec.text} className="section-label" style={{ left: sec.x, top: sec.y }}>
              {sec.text}
            </div>
          ))}
          {NODES.map(node => (
            <NodeCard
              key={node.id}
              node={node}
              selected={selectedNode?.id === node.id}
              dimmed={litIds !== null && !litIds.has(node.id)}
              onClick={handleNodeClick}
            />
          ))}
        </div>
      </div>

      <SidePanel node={selectedNode} nodeMap={nodeMap} edges={EDGES} onClose={handleClose} />
      <Legend />
      <ZoomControls onZoom={applyZoom} onReset={resetView} />
    </>
  );
}

// ── Root App — owns the top-level tab switcher ────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState('tree'); // 'tree' | 'runs' | 'changelog' | 'events'

  return (
    <div className="app-shell">

      {/* ── Top navigation bar ── */}
      <div className="top-nav">
        <span className="top-nav-logo">CVR-RCA-Skill</span>
        <div className="top-nav-divider" />
        <button
          className={`tab-pill${activeTab === 'tree' ? ' active' : ''}`}
          onClick={() => setActiveTab('tree')}>
          🗺 Decision Tree
        </button>
        <button
          className={`tab-pill${activeTab === 'runs' ? ' active' : ''}`}
          onClick={() => setActiveTab('runs')}>
          🧪 Test Runs
        </button>
        <button
          className={`tab-pill${activeTab === 'changelog' ? ' active' : ''}`}
          onClick={() => setActiveTab('changelog')}>
          📋 Changelog
        </button>
        <button
          className={`tab-pill${activeTab === 'events' ? ' active' : ''}`}
          onClick={() => setActiveTab('events')}>
          ⚡ Funnel Events
        </button>

        {activeTab === 'tree' && (
          <>
            <div className="topbar-hint" style={{ marginLeft: 'auto' }}>
              Click any node to inspect &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; Scroll to zoom
            </div>
            <div className="topbar-pill" style={{
              background: '#f0fdf4', color: '#15803d', borderColor: '#bbf7d0'
            }}>
              {NODES.length} nodes · {EDGES.length} edges
            </div>
          </>
        )}
      </div>

      {/* ── Tab content ── */}
      <div className="tab-content">
        {activeTab === 'tree' && <DecisionTreeView />}
        {activeTab === 'runs' && <TestRunsExplorer />}
        {activeTab === 'changelog' && <ChangelogExplorer />}
        {activeTab === 'events' && <EventsReference />}
      </div>

    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
